<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Scheduler</title>

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"
    ></script>

    <!-- MSAL.js -->
    <script
      type="text/javascript"
      src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"
    ></script>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main id="app-body">
      <h2>Schedule Meeting</h2>
      <div class="form-group">
        <label for="meetingTitle">Meeting Title</label>
        <input type="text" id="meetingTitle" placeholder="Enter title..." />
      </div>
      <div class="form-group">
        <label for="meetingDate">Date</label>
        <input type="text" id="meetingDate" placeholder="DD MMM YYYY" />
      </div>
      <div class="form-group">
        <label for="meetingType">Meeting Type</label>
        <select id="meetingType">
          <option value="Client">Client</option>
          <option value="Internal">Internal</option>
        </select>
      </div>

      <button id="injectAndLog" class="submit-btn">Schedule & Log</button>

      <div id="statusMessage" class="status"></div>
    </main>
    <script type="text/javascript" src="taskpane.js"></script>
  </body>
</html>
