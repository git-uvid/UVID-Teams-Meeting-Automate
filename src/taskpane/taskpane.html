<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Scheduler</title>

    <!-- Office JavaScript API -->
    <script
      type="text/javascript"
      src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"
    ></script>

    <!-- MSAL.js -->
    <script
      type="text/javascript"
      src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"
    ></script>

    <link href="taskpane.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <main id="app-body">
      <h2>Meeting Setup & Testing</h2>

      <div class="form-container">
        <div class="form-group"><label for="meetingTitle">Title</label><input type="text" id="meetingTitle" /></div>
        <div class="form-group"><label for="meetingId">Meeting ID</label><input type="text" id="meetingId" /></div>
        <div class="form-group"><label for="seriesId">Series ID</label><input type="text" id="seriesId" /></div>
        <div class="form-group"><label for="project">Project</label><input type="text" id="project" /></div>
        
        <div class="form-group">
          <label for="meetingType">Meeting Type</label>
          <select id="meetingType">
            <option value="Client">Client</option>
            <option value="Internal">Internal</option>
          </select>
        </div>
        
        <div class="form-group"><label for="leadEmail">Lead Email</label><input type="text" id="leadEmail" /></div>
        <div class="form-group"><label for="scheduledDate">Scheduled Date</label><input type="text" id="scheduledDate" placeholder="e.g. 2024-05-15" /></div>
        <div class="form-group"><label for="timezone">Timezone</label><input type="text" id="timezone" /></div>
        <div class="form-group"><label for="duration">Duration (minutes)</label><input type="number" id="duration" /></div>
        <div class="form-group"><label for="participants">Participants</label><textarea id="participants"></textarea></div>
        
        <div class="form-group checkbox-group">
          <input type="checkbox" id="recurring" /> <label for="recurring">Recurring</label>
        </div>
        
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="Scheduled">Scheduled</option>
            <option value="Rescheduled">Rescheduled</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        
        <div class="form-group checkbox-group">
          <input type="checkbox" id="transcriptFiled" checked /> <label for="transcriptFiled">Transcript Filed</label>
        </div>
        
        <div class="form-group checkbox-group">
          <input type="checkbox" id="decisionRecords" checked /> <label for="decisionRecords">Decision Records Created</label>
        </div>
        
        <div class="form-group">
          <label for="meetingStatus">Meeting Status</label>
          <select id="meetingStatus">
            <option value="Requested">Requested</option>
            <option value="Created">Created</option>
            <option value="Rescheduled">Rescheduled</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
      </div>

      <div class="button-group">
        <button id="createListBtn" class="action-btn secondary">Create List Only</button>
        <button id="addEmailBtn" class="action-btn secondary">Add Email Only</button>
        <button id="injectAndLog" class="action-btn primary">Schedule & Log</button>
      </div>

      <div id="statusMessage" class="status"></div>
    </main>
    <script type="text/javascript" src="taskpane.js"></script>
  </body>
</html>
